<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduMatch | Haldwani School Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0b1221; color: #ffffff; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card { background: #161f30; border-radius: 2rem; border: 1px solid rgba(255, 255, 255, 0.05); }
        .input-field { background: #1c263a; border-radius: 1rem; padding: 1.2rem; border: 1px solid #2d3a54; width: 100%; outline: none; transition: 0.3s; color: white; }
        .input-field:focus { border-color: #3b82f6; background: #121a2b; }
        
        .rank-box { background: #242f48; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-weight: 800; font-size: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .rank-box.active-rank { border: 1px solid #3b82f6; color: #3b82f6; box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }

        #compareBar { 
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 500px; background: #2563eb; padding: 1.2rem;
            border-radius: 1.5rem; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000;
        }
        #compareBar.active { bottom: 30px; }

        .chat-btn { position: fixed; bottom: 2rem; right: 2rem; background: #2563eb; padding: 1rem; border-radius: 50%; box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4); transition: 0.3s; z-index: 100; }
        th { color: #64748b; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 800; padding: 1.5rem 1rem; }
        td { padding: 1.2rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .facility-tag { background: rgba(59, 130, 246, 0.1); color: #60a5fa; padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: 700; text-transform: uppercase; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Loading Animation */
        .loading-shimmer { background: linear-gradient(90deg, #161f30 25%, #1c263a 50%, #161f30 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    </style>
</head>
<body class="p-4 md:p-10 max-w-6xl mx-auto min-h-screen">

    <header class="mb-10">
        <h1 class="text-4xl font-black italic tracking-tighter uppercase leading-none">EDU<span class="text-blue-500">MATCH</span></h1>
        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-1">Haldwani's Smartest School Finder</p>
        
        <div class="flex gap-4 mt-8">
            <a href="index.html" class="bg-[#1c263a] px-8 py-3 rounded-2xl text-[11px] font-black uppercase tracking-widest hover:bg-white hover:text-black transition-all">Home</a>
            <a href="analytics.html" class="bg-blue-600 px-8 py-3 rounded-2xl text-[11px] font-black uppercase tracking-widest shadow-lg shadow-blue-500/20">Analytics</a>
        </div>
    </header>

    <section class="glass-card p-8 mb-10">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div>
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-3">Search Name</label>
                <input type="text" id="nameSearch" onkeyup="filterData()" placeholder="Type school name..." class="input-field font-bold text-sm italic">
            </div>
            <div>
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-3">Filter Board</label>
                <select id="boardFilter" onchange="filterData()" class="input-field font-bold text-sm appearance-none cursor-pointer">
                    <option value="all">All Boards</option>
                    <option value="CBSE">CBSE</option>
                    <option value="ICSE">ICSE</option>
                </select>
            </div>
            <div>
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-3">Max Yearly Budget</label>
                <input type="number" id="budgetInput" oninput="filterData()" placeholder="e.g. 120000" class="input-field font-bold text-sm italic">
            </div>
        </div>
    </section>

    <div class="glass-card overflow-hidden mb-24">
        <div class="overflow-x-auto no-scrollbar">
            <table class="w-full text-left min-w-[900px]">
                <thead>
                    <tr>
                        <th>Compare</th>
                        <th>Rank & School Name</th>
                        <th>Facilities</th>
                        <th>Annual Fees</th>
                        <th>User Rating</th>
                        <th>Board</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="6" class="p-20 text-center font-bold text-blue-400">Syncing with Live API...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="compareBar">
        <div class="text-white">
            <p id="compareCount" class="font-black text-sm uppercase italic leading-none">0 Selected</p>
            <p class="text-[9px] font-bold opacity-70 uppercase mt-1 tracking-widest">Ready for side-by-side view</p>
        </div>
        <button onclick="goToCompare()" class="bg-white text-blue-600 px-6 py-2.5 rounded-xl font-black uppercase text-[10px] tracking-widest hover:scale-105 transition-all">
            Compare Now
        </button>
    </div>

    <a href="chat.html" class="chat-btn">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
        </svg>
    </a>

    <script src="schools.js"></script>
    <script>
        // --- API CONFIGURATION ---
        const BIN_ID = "69e36a1c36566621a8c7e0e3";
        const MASTER_KEY = "$2a$10$N85oyaL2ZupXuTSbtM.AYuRlofDfMkws8yQ0mjssb99y1JeLtL.cG";
        const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}/latest`;

        let selectedSchools = [];
        let liveApiData = { featuredId: null, fees: null };

        // 1. Fetch Data from API
        async function fetchLiveAPI() {
            try {
                const response = await fetch(API_URL, {
                    headers: { "X-Master-Key": MASTER_KEY }
                });
                const data = await response.json();
                liveApiData = data.record;
                renderTable(schoolData);
            } catch (error) {
                console.error("API Sync Error:", error);
                renderTable(schoolData); // Offline Fallback
            }
        }

        function toggleCompare(id) {
            const index = selectedSchools.indexOf(id);
            if (index > -1) selectedSchools.splice(index, 1);
            else if (selectedSchools.length < 3) selectedSchools.push(id);
            else { alert("Max 3 schools compare kar sakte ho!"); return false; }
            updateBar();
        }

        function updateBar() {
            const bar = document.getElementById('compareBar');
            const txt = document.getElementById('compareCount');
            txt.innerText = `${selectedSchools.length} School${selectedSchools.length > 1 ? 's' : ''} Selected`;
            if (selectedSchools.length > 0) bar.classList.add('active');
            else bar.classList.remove('active');
        }

        function goToCompare() {
            if (selectedSchools.length < 2) alert("Please select at least 2 schools!");
            else location.href = `compare.html?ids=${selectedSchools.join(',')}`;
        }

        function renderTable(data) {
            const body = document.getElementById('tableBody');
            
            // API LOGIC: Use liveApiData instead of localStorage
            const featuredId = liveApiData.featuredId;
            let sorted = [...data].sort((a, b) => b.rating - a.rating);
            
            if (featuredId) {
                const fIndex = sorted.findIndex(s => s.id == featuredId);
                if (fIndex > -1) {
                    const [featured] = sorted.splice(fIndex, 1);
                    sorted.unshift(featured); 
                }
            }
            
            body.innerHTML = sorted.map((school, index) => {
                // API LOGIC: Dynamic fees from API
                const finalFee = (school.id == featuredId && liveApiData.fees) ? liveApiData.fees : school.fees;

                return `
                <tr class="hover:bg-white/5 transition-all cursor-pointer" onclick="location.href='details.html?id=${school.id}'">
                    <td onclick="event.stopPropagation()">
                        <input type="checkbox" onchange="toggleCompare(${school.id})" ${selectedSchools.includes(school.id) ? 'checked' : ''} class="w-5 h-5 rounded border-gray-700 bg-transparent accent-blue-600 cursor-pointer">
                    </td>
                    <td>
                        <div class="flex items-center gap-4">
                            <div class="rank-box ${index === 0 ? 'active-rank' : ''}">${index + 1}</div>
                            <div class="font-black italic uppercase text-[13px] tracking-tight">${school.name}</div>
                        </div>
                    </td>
                    <td>
                        <div class="flex gap-1 flex-wrap max-w-[150px]">
                            <span class="facility-tag">Lab</span>
                            <span class="facility-tag">Sports</span>
                            <span class="facility-tag">Wifi</span>
                        </div>
                    </td>
                    <td class="font-black text-emerald-400 italic text-sm">₹${finalFee.toLocaleString()}</td>
                    <td>
                        <div class="flex flex-col">
                            <span class="text-yellow-500 text-xs tracking-tighter">★★★★★</span>
                            <span class="text-[9px] font-black text-slate-500 uppercase mt-1">${school.rating} Score</span>
                        </div>
                    </td>
                    <td class="text-[10px] font-extrabold text-blue-400 uppercase tracking-widest">${school.board}</td>
                </tr>
            `}).join('');
        }

        function filterData() {
            const name = document.getElementById('nameSearch').value.toLowerCase();
            const board = document.getElementById('boardFilter').value;
            const budget = document.getElementById('budgetInput').value;
            const filtered = schoolData.filter(s => 
                s.name.toLowerCase().includes(name) && 
                (board === 'all' || s.board === board) &&
                (!budget || s.fees <= budget)
            );
            renderTable(filtered);
        }

        // Initialize with API
        window.onload = fetchLiveAPI;
    </script>
</body>
</html>
