<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduMatch | School Directory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0b1120; color: #ffffff; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .neon-green { color: #4ade80; text-shadow: 0 0 10px rgba(74, 222, 128, 0.2); }
        .input-dark { background: #1e293b; border: 1px solid #334155; color: white; transition: all 0.3s ease; }
        .input-dark:focus { border-color: #2563eb; box-shadow: 0 0 15px rgba(37, 99, 235, 0.2); outline: none; }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-12">
            <div>
                <h1 class="text-4xl font-black tracking-tighter italic">EDU<span class="text-blue-500">MATCH</span></h1>
                <p class="text-slate-500 text-xs font-bold uppercase tracking-widest mt-1">Haldwani School Market Master-Table</p>
            </div>
            
            <div class="flex gap-4">
                <a href="index.html" class="px-6 py-3 rounded-2xl bg-slate-800 text-xs font-black uppercase tracking-widest hover:bg-slate-700 transition-all">Home</a>
                <a href="analytics.html" class="px-6 py-3 rounded-2xl bg-blue-600 text-xs font-black uppercase tracking-widest hover:bg-blue-700 transition-all shadow-lg shadow-blue-900/20">Analytics</a>
            </div>
        </div>

        <div class="glass-card p-8 rounded-[2.5rem] mb-10 border border-slate-800">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div>
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-3">Search School</label>
                    <input type="text" id="nameSearch" oninput="filterData()" placeholder="e.g. Aryaman Birla" class="input-dark w-full px-6 py-4 rounded-2xl font-bold">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-3">Board</label>
                    <select id="boardFilter" onchange="filterData()" class="input-dark w-full px-6 py-4 rounded-2xl font-bold appearance-none">
                        <option value="all">All Boards</option>
                        <option value="CBSE">CBSE</option>
                        <option value="ICSE">ICSE</option>
                        <option value="STATE">State Board</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-3">Max Annual Budget</label>
                    <input type="number" id="budgetFilter" oninput="filterData()" placeholder="e.g. 100000" class="input-dark w-full px-6 py-4 rounded-2xl font-bold">
                </div>
            </div>
        </div>

        <div class="glass-card rounded-[2.5rem] overflow-hidden border border-slate-800">
            <div class="overflow-x-auto">
                <table class="w-full border-collapse">
                    <thead>
                        <tr class="bg-slate-800/50">
                            <th class="p-6 text-left text-[10px] font-black text-slate-500 uppercase tracking-widest">No. & School Name</th>
                            <th class="p-6 text-left text-[10px] font-black text-slate-500 uppercase tracking-widest">Board</th>
                            <th class="p-6 text-left text-[10px] font-black text-slate-500 uppercase tracking-widest">Top Facilities</th>
                            <th class="p-6 text-left text-[10px] font-black text-slate-500 uppercase tracking-widest">Monthly Fees</th>
                            <th class="p-6 text-left text-[10px] font-black text-slate-500 uppercase tracking-widest">Awards</th>
                            <th class="p-6 text-right text-[10px] font-black text-slate-500 uppercase tracking-widest">Annual Total</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="schools.js"></script>
    <script>
        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = data.map((s, index) => `
                <tr class="border-b border-slate-800/50 hover:bg-slate-800/30 transition-colors group cursor-pointer" onclick="window.location.href='details.html?id=${s.id}'">
                    <td class="p-6">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 bg-slate-800 border border-slate-700 rounded-xl flex items-center justify-center font-black text-sm text-slate-400">
                                ${index + 1}
                            </div>
                            <div>
                                <p class="font-black text-slate-200 group-hover:text-blue-400 transition-colors">${s.name}</p>
                                </div>
                        </div>
                    </td>

                    <td class="p-6">
                        <span class="px-4 py-1.5 rounded-full bg-slate-800 border border-slate-700 text-[10px] font-black text-blue-400 uppercase tracking-widest">
                            ${s.board}
                        </span>
                    </td>

                    <td class="p-6">
                        <div class="flex flex-wrap gap-2">
                            ${s.facilities.slice(0, 2).map(f => `
                                <span class="text-[9px] font-bold text-slate-400 bg-slate-800/50 px-2 py-1 rounded-md border border-slate-700/50">${f}</span>
                            `).join('')}
                        </div>
                    </td>

                    <td class="p-6">
                        <p class="text-sm font-bold text-slate-300">₹${Math.round(s.fees / 12).toLocaleString()}</p>
                        <p class="text-[9px] text-slate-500 font-bold uppercase mt-0.5 italic">Est. Monthly</p>
                    </td>

                    <td class="p-6">
                        <div class="flex items-center gap-2">
                            <span class="text-lg">🏆</span>
                            <p class="text-[10px] font-bold text-green-500 italic uppercase tracking-tighter">${s.trophy || 'Verified'}</p>
                        </div>
                    </td>

                    <td class="p-6 text-right">
                        <p class="text-xl font-black neon-green italic tracking-tighter">₹${s.fees.toLocaleString()}</p>
                    </td>
                </tr>
            `).join('');
        }

        function filterData() {
            const nameValue = document.getElementById('nameSearch').value.toLowerCase();
            const boardValue = document.getElementById('boardFilter').value;
            const budgetValue = document.getElementById('budgetFilter').value;

            const filtered = schoolData.filter(s => {
                const matchesName = s.name.toLowerCase().includes(nameValue);
                const matchesBoard = (boardValue === 'all') || (s.board.toUpperCase() === boardValue.toUpperCase());
                const matchesBudget = !budgetValue || (s.fees <= budgetValue);
                return matchesName && matchesBoard && matchesBudget;
            });
            renderTable(filtered);
        }

        renderTable(schoolData);
    </script>
</body>
</html>
