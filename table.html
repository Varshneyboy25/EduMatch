<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduMatch | School Directory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0b1120; color: #ffffff; font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .neon-green { color: #4ade80; text-shadow: 0 0 10px rgba(74, 222, 128, 0.2); }
        .input-dark { background: #1e293b; border: 1px solid #334155; color: white; transition: all 0.3s ease; }
        .input-dark:focus { border-color: #2563eb; outline: none; box-shadow: 0 0 15px rgba(37, 99, 235, 0.1); }
        
        /* Floating Elements */
        #compareBtn { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); z-index: 50; display: none; }
        .ai-fab { position: fixed; bottom: 2rem; right: 2rem; z-index: 50; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0b1120; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="p-6 md:p-12 pb-32">

    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-8">
            <div>
                <h1 class="text-4xl font-black tracking-tighter italic uppercase text-white">EDU<span class="text-blue-500">MATCH</span></h1>
                <p class="text-slate-500 text-xs font-bold uppercase tracking-widest mt-1 text-emerald-500">Haldwani's Smartest School Finder</p>
            </div>
            <div class="flex gap-4">
                <a href="index.html" class="px-6 py-3 rounded-2xl bg-slate-800 text-xs font-black uppercase tracking-widest hover:bg-slate-700 transition-all">Home</a>
                <a href="analytics.html" class="px-6 py-3 rounded-2xl bg-blue-600 text-xs font-black uppercase tracking-widest hover:bg-blue-700 transition-all shadow-lg shadow-blue-900/40">Analytics</a>
            </div>
        </div>

        <div class="glass-card p-8 rounded-[2.5rem] mb-10 border border-slate-800">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div>
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-3 text-blue-400">Search Name</label>
                    <input type="text" id="nameSearch" oninput="filterData()" placeholder="Type school name..." class="input-dark w-full px-6 py-4 rounded-2xl font-bold italic">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-3 text-blue-400">Filter Board</label>
                    <select id="boardFilter" onchange="filterData()" class="input-dark w-full px-6 py-4 rounded-2xl font-bold appearance-none">
                        <option value="all">All Boards</option>
                        <option value="CBSE">CBSE</option>
                        <option value="ICSE">ICSE</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-3 text-blue-400">Max Yearly Budget</label>
                    <input type="number" id="budgetFilter" oninput="filterData()" placeholder="e.g. 120000" class="input-dark w-full px-6 py-4 rounded-2xl font-bold">
                </div>
            </div>
        </div>

        <div class="glass-card rounded-[2.5rem] overflow-hidden border border-slate-800 shadow-2xl">
            <div class="overflow-x-auto">
                <table class="w-full border-collapse">
                    <thead>
                        <tr class="bg-slate-800/50 border-b border-slate-700">
                            <th class="p-6 text-left text-[10px] font-black text-slate-500 uppercase tracking-widest italic">Compare</th>
                            <th class="p-6 text-left text-[10px] font-black text-slate-500 uppercase tracking-widest">Rank & School Name</th>
                            <th class="p-6 text-left text-[10px] font-black text-slate-500 uppercase tracking-widest">User Rating</th>
                            <th class="p-6 text-left text-[10px] font-black text-slate-500 uppercase tracking-widest">Board</th>
                            <th class="p-6 text-right text-[10px] font-black text-slate-500 uppercase tracking-widest">Annual Fees</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="ai-fab">
        <a href="chat.html" title="Talk to AI Agent" class="w-16 h-16 bg-blue-600 rounded-full shadow-2xl flex items-center justify-center hover:rotate-12 hover:scale-110 transition-all border-4 border-slate-900 shadow-blue-600/20">
            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
            </svg>
            <span class="absolute -top-1 -right-1 flex h-4 w-4">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-4 w-4 bg-emerald-500 border-2 border-slate-900"></span>
            </span>
        </a>
    </div>

    <button id="compareBtn" onclick="goToCompare()" class="px-10 py-5 rounded-full bg-emerald-500 text-black font-black uppercase tracking-[0.2em] text-xs shadow-[0_10px_40px_rgba(16,185,129,0.3)] hover:scale-105 active:scale-95 transition-all">
        Compare Selected (<span id="count">0</span>)
    </button>

    <script src="schools.js"></script>
    <script>
        let selectedSchools = [];

        // Generate Star UI
        function getStars(rating) {
            let stars = '';
            for(let i=1; i<=5; i++) {
                stars += i <= Math.floor(rating) ? '★' : '☆';
            }
            return `<span class="text-yellow-500 text-sm font-bold tracking-tight">${stars}</span>`;
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = data.map((s, index) => `
                <tr class="border-b border-slate-800/50 hover:bg-slate-800/30 transition-all group">
                    <td class="p-6">
                        <input type="checkbox" ${selectedSchools.includes(s.id) ? 'checked' : ''} onchange="toggleCompare(${s.id})" class="w-6 h-6 rounded-lg bg-slate-800 border-slate-700 text-emerald-500 focus:ring-emerald-500 cursor-pointer">
                    </td>
                    <td class="p-6 cursor-pointer" onclick="window.location.href='details.html?id=${s.id}'">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 bg-slate-800 border border-slate-700 rounded-xl flex items-center justify-center font-black text-sm text-slate-400 group-hover:border-blue-500/50 group-hover:text-blue-400 transition-all">${index + 1}</div>
                            <p class="font-black text-slate-200 group-hover:text-blue-400 transition-colors uppercase italic tracking-tight">${s.name}</p>
                        </div>
                    </td>
                    <td class="p-6">
                        ${getStars(s.rating)}
                        <p class="text-[9px] font-bold text-slate-500 mt-1 uppercase tracking-widest">${s.rating} score</p>
                    </td>
                    <td class="p-6">
                        <span class="px-4 py-1.5 rounded-full bg-slate-800 border border-slate-700 text-[10px] font-black text-blue-400 uppercase tracking-widest">${s.board}</span>
                    </td>
                    <td class="p-6 text-right">
                        <p class="text-xl font-black neon-green italic tracking-tighter italic">₹${s.fees.toLocaleString()}</p>
                        <p class="text-[9px] text-slate-500 font-bold uppercase mt-1 italic tracking-widest underline decoration-slate-700 decoration-2 underline-offset-4">Verified Fee</p>
                    </td>
                </tr>
            `).join('');
        }

        function toggleCompare(id) {
            const idx = selectedSchools.indexOf(id);
            if (idx === -1) selectedSchools.push(id);
            else selectedSchools.splice(idx, 1);
            
            const btn = document.getElementById('compareBtn');
            const countSpan = document.getElementById('count');
            
            if (selectedSchools.length >= 2) {
                btn.style.display = 'block';
                countSpan.innerText = selectedSchools.length;
            } else {
                btn.style.display = 'none';
            }
        }

        function filterData() {
            const nameValue = document.getElementById('nameSearch').value.toLowerCase();
            const boardValue = document.getElementById('boardFilter').value;
            const budgetValue = document.getElementById('budgetFilter').value;

            const filtered = schoolData.filter(s => {
                const matchesName = s.name.toLowerCase().includes(nameValue);
                const matchesBoard = (boardValue === 'all') || (s.board.toUpperCase() === boardValue.toUpperCase());
                const matchesBudget = !budgetValue || (s.fees <= budgetValue);
                return matchesName && matchesBoard && matchesBudget;
            });
            renderTable(filtered);
        }

        function goToCompare() {
            window.location.href = `compare.html?ids=${selectedSchools.join(',')}`;
        }

        // Initial Load
        renderTable(schoolData);
    </script>
</body>
</html>
