<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduMatch | School Directory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0b1120; color: #ffffff; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .neon-green { color: #4ade80; text-shadow: 0 0 10px rgba(74, 222, 128, 0.2); }
        .input-dark { background: #1e293b; border: 1px solid #334155; color: white; transition: all 0.3s ease; }
        .input-dark:focus { border-color: #2563eb; box-shadow: 0 0 15px rgba(37, 99, 235, 0.2); outline: none; }
        .custom-scroll::-webkit-scrollbar { height: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-4">
                <a href="index.html" class="bg-slate-800 p-3 rounded-2xl border border-slate-700 hover:bg-blue-600 transition-all group">
                    <svg class="w-6 h-6 text-white group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                    </svg>
                </a>
                <div>
                    <div class="flex items-center gap-2">
                        <div class="bg-blue-600 px-2 py-0.5 rounded text-white font-black text-sm">E</div>
                        <h2 class="text-2xl font-black italic tracking-tighter uppercase">EduMatch</h2>
                    </div>
                    <p class="text-[9px] font-bold text-blue-500 tracking-[0.2em] uppercase mt-1">Budget Friendly School Finder</p>
                </div>
            </div>
            <div class="flex gap-3">
                <a href="analytics.html" class="bg-blue-600 text-white px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-blue-700 transition-all shadow-lg shadow-blue-900/20">
                    View Analytics
                </a>
                <button class="bg-slate-800/50 text-white px-5 py-2.5 rounded-xl text-[10px] font-black border border-slate-700 uppercase tracking-widest">
                    Download PDF
                </button>
            </div>
        </div>

        <div class="glass-card p-8 rounded-[2.5rem] mb-10 border border-slate-800 shadow-2xl">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div>
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3">Search School</label>
                    <input type="text" id="nameSearch" onkeyup="filterData()" placeholder="Enter school name..." class="input-dark w-full px-5 py-4 rounded-2xl font-bold">
                </div>

                <div>
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3">Filter by Board</label>
                    <select id="boardFilter" onchange="filterData()" class="input-dark w-full px-5 py-4 rounded-2xl font-bold appearance-none cursor-pointer">
                        <option value="all">All Boards</option>
                        <option value="CBSE">CBSE</option>
                        <option value="ICSE">ICSE</option>
                        <option value="OTHER">Other Board</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3">Annual Budget (Max)</label>
                    <input type="number" id="budgetFilter" onkeyup="filterData()" placeholder="e.g. 80000" class="input-dark w-full px-5 py-4 rounded-2xl font-bold">
                </div>
            </div>
        </div>

        <div class="glass-card rounded-[2.5rem] overflow-hidden border border-slate-800 shadow-2xl">
            <div class="overflow-x-auto custom-scroll">
                <table class="w-full text-left">
                    <thead>
                        <tr class="border-b border-slate-800 bg-slate-900/60">
                            <th class="p-6 text-[9px] font-black text-slate-500 uppercase tracking-widest">No.</th>
                            <th class="p-6 text-[9px] font-black text-slate-500 uppercase tracking-widest">School & Principal</th>
                            <th class="p-6 text-[9px] font-black text-slate-500 uppercase tracking-widest">Stats (T/S)</th>
                            <th class="p-6 text-[9px] font-black text-slate-500 uppercase tracking-widest">Facilities</th>
                            <th class="p-6 text-[9px] font-black text-slate-500 uppercase tracking-widest">Achievement</th>
                            <th class="p-6 text-[9px] font-black text-slate-500 uppercase tracking-widest text-right">Annual Fees</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="schools.js"></script>
    <script>
        const tableBody = document.getElementById('tableBody');

        function renderTable(data) {
            if (data.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="6" class="p-10 text-center text-slate-500 font-bold italic">No results found for EduMatch search.</td></tr>`;
                return;
            }
            tableBody.innerHTML = data.map((s, index) => `
                <tr class="border-b border-slate-800/40 hover:bg-blue-600/5 group">
                    <td class="p-6 text-slate-600 font-black text-xs">${String(index + 1).padStart(2, '0')}</td>
                    
                    <td class="p-6 cursor-pointer" onclick="window.location.href='details.html?id=${s.id}'">
                        <p class="font-extrabold text-white text-base mb-0.5 group-hover:text-blue-400 transition-all">${s.name}</p>
                        <p class="text-[10px] font-bold text-blue-500/80 uppercase">Principal: ${s.principal || 'N/A'}</p>
                        <div class="mt-2 flex items-center gap-2 text-[9px] font-black">
                             <span class="text-amber-500">⭐ ${s.rating}</span>
                             <span class="text-slate-500">| ${s.board} Board</span>
                        </div>
                    </td>

                    <td class="p-6">
                        <div class="flex flex-col gap-1 text-[11px] font-bold text-slate-400">
                            <span>T: <b class="text-white">${s.teachers || '0'}</b></span>
                            <span>S: <b class="text-white">${s.students || '0'}</b></span>
                        </div>
                    </td>

                    <td class="p-6">
                        <div class="flex flex-wrap gap-1.5 max-w-[130px]">
                            ${(s.facilities || ['Library', 'Lab']).map(f => `
                                <span class="text-[8px] font-black bg-slate-800 text-slate-400 px-2 py-0.5 rounded uppercase border border-slate-700">${f}</span>
                            `).join('')}
                        </div>
                    </td>

                    <td class="p-6">
                        <div class="flex items-center gap-2">
                            <span class="text-lg">🏆</span>
                            <p class="text-[10px] font-bold text-green-500 italic leading-tight uppercase tracking-tighter">${s.trophy || 'EduMatch Verified'}</p>
                        </div>
                    </td>

                    <td class="p-6 text-right">
                        <p class="text-xl font-black neon-green italic tracking-tighter">₹${s.fees.toLocaleString()}</p>
                    </td>
                </tr>
            `).join('');
        }

        function filterData() {
            const nameValue = document.getElementById('nameSearch').value.toLowerCase();
            const boardValue = document.getElementById('boardFilter').value;
            const budgetValue = document.getElementById('budgetFilter').value;

            const filtered = schoolData.filter(s => {
                const matchesName = s.name.toLowerCase().includes(nameValue);
                const matchesBoard = (boardValue === 'all') || (s.board.toUpperCase() === boardValue.toUpperCase());
                const matchesBudget = !budgetValue || (s.fees <= budgetValue);
                return matchesName && matchesBoard && matchesBudget;
            });
            renderTable(filtered);
        }

        renderTable(schoolData);
    </script>
</body>
</html>
