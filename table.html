<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduMatch | School Directory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0b1120; color: #ffffff; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .neon-green { color: #4ade80; text-shadow: 0 0 10px rgba(74, 222, 128, 0.2); }
        .input-dark { background: #1e293b; border: 1px solid #334155; color: white; transition: all 0.3s ease; }
        /* Floating Button Style */
        #compareBtn { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); z-index: 100; display: none; }
    </style>
</head>
<body class="p-6 md:p-12 pb-32">

    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-12">
            <div>
                <h1 class="text-4xl font-black tracking-tighter italic">EDU<span class="text-blue-500">MATCH</span></h1>
                <p class="text-slate-500 text-xs font-bold uppercase tracking-widest mt-1">Haldwani School Market</p>
            </div>
            <div class="flex gap-4">
                <a href="index.html" class="px-6 py-3 rounded-2xl bg-slate-800 text-xs font-black uppercase tracking-widest hover:bg-slate-700 transition-all">Home</a>
                <a href="analytics.html" class="px-6 py-3 rounded-2xl bg-blue-600 text-xs font-black uppercase tracking-widest hover:bg-blue-700 transition-all shadow-lg">Analytics</a>
            </div>
        </div>

        <div class="glass-card rounded-[2.5rem] overflow-hidden border border-slate-800">
            <div class="overflow-x-auto">
                <table class="w-full border-collapse">
                    <thead>
                        <tr class="bg-slate-800/50">
                            <th class="p-6 text-left text-[10px] font-black text-slate-500 uppercase tracking-widest italic">Compare</th>
                            <th class="p-6 text-left text-[10px] font-black text-slate-500 uppercase tracking-widest">No. & School Name</th>
                            <th class="p-6 text-left text-[10px] font-black text-slate-500 uppercase tracking-widest">Board</th>
                            <th class="p-6 text-left text-[10px] font-black text-slate-500 uppercase tracking-widest">Monthly Fees</th>
                            <th class="p-6 text-right text-[10px] font-black text-slate-500 uppercase tracking-widest">Annual Total</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <button id="compareBtn" onclick="goToCompare()" class="px-10 py-5 rounded-full bg-emerald-500 text-black font-black uppercase tracking-[0.2em] text-xs shadow-[0_10px_40px_rgba(16,185,129,0.3)] hover:scale-105 active:scale-95 transition-all">
        Compare Selected (<span id="count">0</span>)
    </button>

    <script src="schools.js"></script>
    <script>
        let selectedSchools = [];
        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = data.map((s, index) => `
                <tr class="border-b border-slate-800/50 hover:bg-slate-800/30 transition-colors group">
                    <td class="p-6">
                        <input type="checkbox" onchange="toggleCompare(${s.id})" class="w-6 h-6 rounded-lg bg-slate-800 border-slate-700 text-emerald-500 focus:ring-emerald-500 cursor-pointer">
                    </td>
                    <td class="p-6 cursor-pointer" onclick="window.location.href='details.html?id=${s.id}'">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 bg-slate-800 border border-slate-700 rounded-xl flex items-center justify-center font-black text-sm text-slate-400">${index + 1}</div>
                            <p class="font-black text-slate-200 group-hover:text-blue-400">${s.name}</p>
                        </div>
                    </td>
                    <td class="p-6">
                        <span class="px-4 py-1.5 rounded-full bg-slate-800 border border-slate-700 text-[10px] font-black text-blue-400 uppercase tracking-widest">${s.board}</span>
                    </td>
                    <td class="p-6 text-sm font-bold text-slate-300">₹${Math.round(s.fees / 12).toLocaleString()}</td>
                    <td class="p-6 text-right font-black neon-green italic text-xl italic tracking-tighter">₹${s.fees.toLocaleString()}</td>
                </tr>
            `).join('');
        }

        function toggleCompare(id) {
            const idx = selectedSchools.indexOf(id);
            if (idx === -1) selectedSchools.push(id);
            else selectedSchools.splice(idx, 1);
            
            const btn = document.getElementById('compareBtn');
            const countSpan = document.getElementById('count');
            
            if (selectedSchools.length >= 2) {
                btn.style.display = 'block';
                countSpan.innerText = selectedSchools.length;
            } else {
                btn.style.display = 'none';
            }
        }

        function goToCompare() {
            window.location.href = `compare.html?ids=${selectedSchools.join(',')}`;
        }
        renderTable(schoolData);
    </script>
</body>
</html>
