<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Details | EduMatch Haldwani</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { background-color: #0b1120; color: #ffffff; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hero-banner {
            height: 250px;
            background: linear-gradient(to bottom, rgba(11, 17, 32, 0) 0%, #0b1120 100%), 
                        url('https://images.unsplash.com/photo-1541339907198-e08756ebafe3?q=80&w=1500&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }
        input, select { background: rgba(15, 23, 42, 0.8) !important; border: 1px solid rgba(51, 65, 85, 0.5) !important; color: white !important; }
    </style>
</head>
<body class="pb-20">

    <div class="hero-banner relative">
        <a href="table.html" class="absolute top-6 left-6 bg-black/50 backdrop-blur-lg p-3 rounded-2xl text-[10px] font-black uppercase tracking-widest border border-white/10 hover:bg-blue-600 transition-all">
            ← Back
        </a>
    </div>

    <div class="max-w-4xl mx-auto px-6 -mt-16 relative z-10">
        
        <div class="glass-card p-10 rounded-[3rem] mb-8">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="text-center md:text-left">
                    <h1 id="schoolName" class="text-4xl md:text-6xl font-black italic uppercase tracking-tighter mb-3">Loading...</h1>
                    <div class="flex justify-center md:justify-start gap-4">
                        <span id="schoolBoard" class="text-blue-400 font-black text-xs uppercase tracking-widest italic tracking-[0.2em]">CBSE</span>
                        <span class="text-slate-500 font-black text-xs uppercase tracking-widest italic tracking-[0.2em]">📍 HALDWANI</span>
                    </div>
                </div>
                <div class="bg-yellow-500/10 p-5 rounded-3xl border border-yellow-500/20 text-center min-w-[120px]">
                    <p class="text-[9px] font-black text-yellow-600 uppercase mb-1 tracking-widest">Expert Rating</p>
                    <p id="schoolRating" class="text-3xl font-black text-yellow-500 italic">★ 0.0</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
            <div class="glass-card p-8 rounded-[2.5rem] border border-slate-800 group hover:border-blue-500 transition-all">
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4 italic">Navigation</p>
                <h4 class="text-xl font-black italic text-white mb-4">DISTANCE FINDER</h4>
                <button onclick="openMaps()" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl font-black uppercase text-xs tracking-widest transition-all shadow-lg shadow-blue-900/40">
                    Check on Google Maps 📍
                </button>
            </div>
            
            <div class="glass-card p-8 rounded-[2.5rem] border border-slate-800">
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4 italic">Financial Estimate</p>
                <h4 class="text-xl font-black italic text-white mb-2 uppercase">Total Package</h4>
                <div class="flex items-baseline gap-2">
                    <span id="totalFee" class="text-4xl font-black text-emerald-400 italic">₹0</span>
                    <span class="text-[10px] text-slate-500 font-bold uppercase italic">/ 1st Year*</span>
                </div>
                <p class="text-[8px] text-slate-600 font-bold uppercase mt-2">*Includes Admission, Tuition & Uniform Estimate</p>
            </div>
        </div>

        <div id="enquirySection" class="glass-card p-10 rounded-[3.5rem] border-2 border-blue-600/20 shadow-2xl mb-10">
            <div class="text-center mb-10">
                <h2 class="text-3xl font-black italic uppercase tracking-tighter">Instant <span class="text-blue-500">Enquiry</span></h2>
                <p class="text-[10px] text-slate-500 font-black uppercase tracking-[0.3em] mt-2 italic">Get direct call from admission desk</p>
            </div>
            
            <form id="enquiryForm" action="https://formspree.io/f/mpqkqwey" method="POST" class="grid grid-cols-1 gap-6">
                <input type="hidden" name="Target_School" id="hiddenSchoolName">
                
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-500 uppercase ml-2 tracking-widest">Parent Name</label>
                    <input type="text" name="Parent_Name" placeholder="Enter Full Name" class="w-full px-6 py-5 rounded-2xl font-bold outline-none focus:border-blue-500 transition-all" required>
                </div>
                
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-500 uppercase ml-2 tracking-widest">Mobile Number</label>
                    <input type="tel" name="Mobile" placeholder="10 Digit WhatsApp Number" class="w-full px-6 py-5 rounded-2xl font-bold outline-none focus:border-blue-500 transition-all" required>
                </div>
                
                <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 py-6 rounded-2xl font-black uppercase text-xs tracking-[0.2em] shadow-xl shadow-blue-900/30">
                    Apply Now 🚀
                </button>
            </form>
        </div>

        <div class="flex gap-4">
            <a href="tel:9259576073" class="flex-1 bg-slate-800 border border-slate-700 py-6 rounded-3xl flex items-center justify-center gap-4 hover:bg-slate-700 transition-all">
                <span class="text-xl">📞</span>
                <span class="font-black uppercase text-[10px] tracking-widest text-white">Call Portal Admin</span>
            </a>
        </div>
    </div>

    <a id="waLink" target="_blank" class="fixed bottom-6 right-6 z-[100] w-14 h-14 bg-emerald-500 rounded-full shadow-2xl flex items-center justify-center hover:scale-110 transition-all border-4 border-slate-900">
        <svg class="w-7 h-7 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L0 24l6.335-1.662c1.72.94 3.675 1.439 5.662 1.439h.05c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
    </a>

    <div id="successModal" class="hidden fixed inset-0 z-[500] flex items-center justify-center bg-black/95 backdrop-blur-md p-6">
        <div class="glass-card p-12 rounded-[4rem] border border-blue-500/30 text-center max-w-sm w-full">
            <div class="text-7xl mb-6">🎊</div>
            <h2 class="text-3xl font-black italic mb-3 uppercase tracking-tighter">THANK YOU!</h2>
            <p id="successTxt" class="text-slate-400 text-sm mb-8 leading-relaxed font-medium italic"></p>
            <button onclick="closeModal()" class="w-full bg-white text-black font-black py-4 rounded-2xl uppercase text-[10px] tracking-[0.2em]">Close</button>
        </div>
    </div>

    <script src="schools.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const schoolId = parseInt(urlParams.get('id'));
        const school = schoolData.find(s => s.id === schoolId);

        if (school) {
            document.getElementById('schoolName').innerText = school.name;
            document.getElementById('schoolBoard').innerText = school.board + " BOARD";
            document.getElementById('schoolRating').innerText = "★ " + school.rating;
            
            // Auto Fee Calculator: Base Fees + 15,000 extra for uniform/books
            const totalEst = school.fees + 15000;
            document.getElementById('totalFee').innerText = "₹" + totalEst.toLocaleString();
            
            document.getElementById('hiddenSchoolName').value = school.name;

            // WhatsApp Dynamic Message
            const waMsg = encodeURIComponent(`Hi, I'm interested in admission for ${school.name}. Please provide more details.`);
            document.getElementById('waLink').href = `https://wa.me/9259576073?text=${waMsg}`;
        }

        // Distance Finder Logic
        function openMaps() {
            const dest = encodeURIComponent(school.name + " Haldwani");
            window.open(`https://www.google.com/maps/dir/?api=1&destination=${dest}`, '_blank');
        }

        // Formspree Submission with Confetti & Modal
        const form = document.getElementById('enquiryForm');
        form.onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = "SENDING...";
            btn.disabled = true;

            const response = await fetch(form.action, {
                method: 'POST',
                body: new FormData(form),
                headers: { 'Accept': 'application/json' }
            });

            if (response.ok) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                document.getElementById('successTxt').innerHTML = `Aapki enquiry <b>${school.name}</b> ke liye save ho gayi hai. Hum aapse jald sampark karenge!`;
                document.getElementById('successModal').classList.remove('hidden');
                form.reset();
            }
            btn.innerHTML = "Apply Now 🚀";
            btn.disabled = false;
        };

        function closeModal() {
            document.getElementById('successModal').classList.add('hidden');
        }
    </script>
</body>
</html>
