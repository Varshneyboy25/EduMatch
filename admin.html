<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduMatch Admin | Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <style>body { background: #0b1120; color: white; font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-black italic mb-8 text-blue-500 uppercase">Admin Dashboard</h1>
        
        <div class="bg-slate-900 p-8 rounded-[2rem] border border-white/10 shadow-2xl">
            <h2 class="text-xl font-bold mb-6">Select Featured School (Rank #1)</h2>
            <div id="adminList" class="space-y-4 max-h-[400px] overflow-y-auto pr-4 mb-8">
                </div>
            <button onclick="saveSettings()" class="w-full bg-blue-600 py-5 rounded-2xl font-black uppercase tracking-widest hover:bg-blue-500 transition-all">
                Update Website Ranking 🚀
            </button>
        </div>
    </div>

    <script src="schools.js"></script>
    <script>
        const adminList = document.getElementById('adminList');
        const currentFeatured = localStorage.getItem('featuredSchoolId');

        function loadSchools() {
            adminList.innerHTML = schoolData.map(s => `
                <div class="flex items-center justify-between p-4 bg-slate-800 rounded-xl border border-white/5">
                    <span class="font-bold text-sm">${s.name}</span>
                    <input type="radio" name="featured" value="${s.id}" ${currentFeatured == s.id ? 'checked' : ''} class="w-5 h-5 accent-blue-500">
                </div>
            `).join('');
        }

        function saveSettings() {
            const selected = document.querySelector('input[name="featured"]:checked');
            if (selected) {
                localStorage.setItem('featuredSchoolId', selected.value);
                alert('Website Update Ho Gayi Hai! Ab ye school Rank #1 par dikhega.');
                window.location.href = 'table.html';
            }
        }
        loadSchools();
    </script>
</body>
</html>
